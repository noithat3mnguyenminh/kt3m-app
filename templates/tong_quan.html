<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KT3M - Tổng Quan Tiền Công</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-slate-900 min-h-screen flex justify-center items-center">
    <div class="w-full max-w-md bg-slate-50 min-h-screen shadow-2xl md:min-h-[850px] md:rounded-3xl overflow-hidden flex flex-col relative pb-10">
        
        <div class="p-4 pt-6 bg-white flex items-center gap-3 border-b border-slate-100">
            <a href="/" class="text-slate-700 text-lg"><i class="fa-solid fa-angle-left"></i></a>
            <h1 class="text-lg font-extrabold text-slate-800">Nội Thất Nguyễn Minh</h1>
        </div>

        <div class="p-4">
            <div class="bg-white rounded-2xl p-5 border border-slate-100 shadow-sm">
                <div class="text-xs text-slate-400 font-bold uppercase tracking-wider mb-1">Tổng chưa thanh toán <i class="fa-regular fa-circle-question"></i></div>
                <div class="text-2xl font-black text-emerald-600 mb-4 flex items-center gap-2">
                    <span id="txt-chua-thanh-toan">*,***,*** đ</span> <i class="fa-regular fa-eye text-slate-300 text-sm"></i>
                </div>

                <div class="grid grid-cols-4 gap-2 text-center my-4 pt-2 border-t border-slate-50">
                    <div class="flex flex-col items-center">
                        <div class="w-11 h-11 bg-emerald-50 text-emerald-600 rounded-full flex items-center justify-center text-lg shadow-sm"><i class="fa-solid fa-money-bill-wave"></i></div>
                        <span class="text-[10px] font-bold text-slate-600 mt-1.5">Lợi nhuận</span>
                    </div>
                    <div class="flex flex-col items-center">
                        <div class="w-11 h-11 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center text-lg shadow-sm"><i class="fa-solid fa-users"></i></div>
                        <span class="text-[10px] font-bold text-slate-600 mt-1.5">Nhân viên</span>
                    </div>
                    <div class="flex flex-col items-center">
                        <div class="w-11 h-11 bg-green-50 text-green-600 rounded-full flex items-center justify-center text-lg shadow-sm"><i class="fa-solid fa-file-excel"></i></div>
                        <span class="text-[10px] font-bold text-slate-600 mt-1.5">Xuất Excel</span>
                    </div>
                    <div class="flex flex-col items-center">
                        <div class="w-11 h-11 bg-slate-100 text-slate-500 rounded-full flex items-center justify-center text-lg shadow-sm"><i class="fa-solid fa-ellipsis"></i></div>
                        <span class="text-[10px] font-bold text-slate-600 mt-1.5">Xem thêm</span>
                    </div>
                </div>

                <div class="mt-4 pt-4 border-t border-slate-100 space-y-2.5">
                    <div class="flex justify-between text-sm font-extrabold">
                        <span class="text-blue-600">Tiền Công Tháng 06</span>
                        <span class="text-slate-400 font-medium text-xs flex items-center gap-1">Tháng khác <i class="fa-solid fa-angle-right"></i></span>
                    </div>
                    <div class="flex justify-between items-center text-sm font-medium pt-1">
                        <span class="text-slate-500">Tổng tiền công</span>
                        <span id="txt-tong-cong" class="font-bold text-slate-800">0 đ</span>
                    </div>
                    <div class="flex justify-between items-center text-sm font-medium">
                        <span class="text-slate-500">Tổng đã ứng</span>
                        <span id="txt-tong-ung" class="font-bold text-red-500">0 đ</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="px-4">
            <h2 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2.5">TIỀN CÔNG THÁNG</h2>
            <div class="bg-white rounded-2xl p-4 border border-slate-100 shadow-sm">
                <div class="grid grid-cols-7 gap-1 text-center text-[10px] font-extrabold text-white bg-purple-500/90 py-1.5 rounded-xl mb-3">
                    <div>T2</div><div>T3</div><div>T4</div><div>T5</div><div>T6</div><div>T7</div><div>CN</div>
                </div>
                <div id="calendar-grid" class="grid grid-cols-7 gap-1.5 text-center">
                    </div>
            </div>
        </div>
    </div>

    <script>
        async function loadDuLieu() {
            const response = await fetch('/api/luong/tong-quan-thang/2026-06');
            const data = await response.json();
            document.getElementById('txt-tong-cong').innerText = data.tong_tien_cong.toLocaleString('vi-VN') + " đ";
            document.getElementById('txt-tong-ung').innerText = data.tong_da_ung.toLocaleString('vi-VN) + " đ";
            document.getElementById('txt-chua-thanh-toan').innerText = (data.tong_tien_cong - data.tong_da_ung).toLocaleString('vi-VN') + " đ";

            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = '';
            
            // Vẽ 30 ngày của Tháng 06/2026 (Bắt đầu từ thứ 2)
            for (let day = 1; day <= 30; day++) {
                const dayStr = `2026-06-${day < 10 ? '0' + day : day}`;
                const cong = data.lich_cong[dayStr];
                if(cong) {
                    grid.innerHTML += `
                        <div class="bg-emerald-500 text-white rounded-xl p-1 flex flex-col justify-between h-14 shadow-sm">
                            <span class="text-xs font-black text-right pr-0.5">${day}</span>
                            <span class="text-[7px] font-bold bg-emerald-600/50 rounded py-0.5">${cong.so_gio}H</span>
                            <span class="text-[8px] font-extrabold">${cong.tien/1000}K</span>
                        </div>`;
                } else {
                    grid.innerHTML += `
                        <div class="bg-slate-100 text-slate-400 rounded-xl p-1 flex flex-col justify-start h-14">
                            <span class="text-xs font-bold text-left pl-1">${day}</span>
                        </div>`;
                }
            }
        }
        loadDuLieu();
    </script>
</body>
</html>
