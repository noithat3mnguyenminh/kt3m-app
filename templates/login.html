<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập Hệ Thống KT3M</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-slate-900 font-sans min-h-screen flex items-center justify-center p-4">

    <div class="bg-white w-full max-w-md rounded-3xl p-6 shadow-2xl border border-slate-100">
        <div class="text-center space-y-1">
            <h1 class="text-2xl font-black tracking-widest text-slate-900">HỆ THỐNG KT3M</h1>
            <p class="text-xs text-slate-400 font-semibold uppercase tracking-wider">Nội Thất Nguyễn Minh - Thanh Hóa</p>
        </div>

        <form action="/login" method="POST" class="space-y-4 mt-6">
            <div class="space-y-1.5">
                <label class="text-xs font-black text-slate-500 uppercase">Tài Khoản Số:</label>
                <div class="relative">
                    <i class="fa-solid fa-user absolute left-4 top-3.5 text-slate-400 text-sm"></i>
                    <input name="username" type="text" placeholder="Nhập tên đăng nhập của bạn..." class="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-bold text-slate-800 focus:outline-none focus:border-slate-900" required>
                </div>
            </div>

            <div class="space-y-1.5">
                <label class="text-xs font-black text-slate-500 uppercase">Mật Mã Bảo Mật:</label>
                <div class="relative">
                    <i class="fa-solid fa-lock absolute left-4 top-3.5 text-slate-400 text-sm"></i>
                    <input name="password" type="password" placeholder="Nhập mật khẩu..." class="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-bold text-slate-800 focus:outline-none focus:border-slate-900" required>
                </div>
            </div>

            <button type="submit" class="w-full py-3.5 bg-slate-900 hover:bg-slate-800 text-white font-black text-sm rounded-xl shadow-md transition-all uppercase tracking-wider">
                Xác Thực Đăng Nhập
            </button>
        </form>

        <div class="text-center pt-4 border-t border-slate-100 mt-6">
            <span class="text-[10px] font-bold text-slate-400 uppercase">Bảo mật nội bộ xưởng sản xuất công nghiệp © 2026</span>
        </div>
    </div>

</body>
</html>
